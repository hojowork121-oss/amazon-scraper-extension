<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Amazon抽出</title>

  <style>
    body {
      width: 240px;
      font-family: "Segoe UI", sans-serif;
      background: #f5f7fa;
      text-align: center;
      padding: 15px;
    }

    h3 {
      margin-bottom: 15px;
      color: #333;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #ff9900, #ff6600);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.2);
    }

    button:active {
      transform: scale(0.97);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .icon {
      margin-right: 6px;
    }

    .footer {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>

<body>

  <h3>📦 Amazon抽出ツール</h3>

  <button id="amazon">
    📥 CSVダウンロード
  </button>

  <div class="footer">
    ワンクリックで商品情報を取得
  </div>

  <script src="popup.js"></script>

</body>
</html>
